<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DSA Roadmap — Gridline</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont/tabler-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/lenis@1/dist/lenis.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      /* UNIFIED HIGH-CONTRAST PALETTE: Infused with energetic emerald vectors */
      --accent: #10b981;
      --accent-bright: #34d399;
      --accent-dim: rgba(52, 211, 153, 0.12);
      --accent-glow: rgba(52, 211, 153, 0.35);
      --bg: #030712; /* Deepened dark state layer for rich black contrast */
      --glass-bg: rgba(255, 255, 255, 0.015);
      --glass-border: rgba(52, 211, 153, 0.08); /* Infused borders with emerald hints */
      --text-dim: #94a3b8; /* Swapped muddy slate for crisp slate-zinc */
      --radius: 24px;
      --easy: #34d399;
      --medium: #fbbf24;
      --hard: #f87171;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #f8fafc;
      background-color: var(--bg);
      overflow-x: clip;
      min-height: 100vh;
    }

    /* PREMIUM LAYER: Real-time procedural neon cosmic space aura background */
    .bg-mesh {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 15% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 85% 70%, rgba(5, 150, 105, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(4, 120, 87, 0.04) 0%, transparent 60%);
      z-index: -2;
      filter: blur(40px);
      will-change: transform;
      animation: spaceDrift 24s infinite ease-in-out alternate;
    }
     /* Aurora Background */
    .bg-mesh {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('/bkg5gpt.png');
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    @keyframes spaceDrift {
      0% { transform: scale(1) translate(0px, 0px); }
      100% { transform: scale(1.1) translate(15px, -10px); }
    }

    .bg-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, rgba(3,7,18,0.3) 0%, #030712 100%);
      z-index: -1;
    }

    .glass-card {
      background: rgba(15, 23, 42, 0.35);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(52, 211, 153, 0.15);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.5), 0 0 24px -2px rgba(16, 185, 129, 0.03);
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(52, 211, 153, 0.3), transparent);
    }

    .stat-value {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      text-shadow: 0 0 15px rgba(52, 211, 153, 0.2);
    }

    .day-card {
      background: rgba(255, 255, 255, 0.015);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      overflow: hidden;
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    .day-card:hover {
      background: rgba(52, 211, 153, 0.02);
      border-color: rgba(52, 211, 153, 0.2);
      box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.4), 0 0 16px -4px rgba(52, 211, 153, 0.1);
    }
    
    .day-card.complete {
      border-color: var(--accent-bright);
      box-shadow: 0 4px 24px -4px rgba(52, 211, 153, 0.2);
      background: rgba(16, 185, 129, 0.03);
    }

    .mini-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      transition: all 0.2s ease;
    }
    .mini-dot.on {
      background: var(--accent-bright);
      box-shadow: 0 0 8px 2px var(--accent-glow);
    }

    .prob-box {
      width: 15px; height: 14px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .prob-done .prob-box {
      background: var(--accent-bright);
      border-color: var(--accent-bright);
      box-shadow: 0 0 10px 2px var(--accent-glow);
    }
    .prob-done .prob-box::after {
      content: '✓';
      font-size: 10px;
      color: #030712;
      font-weight: 900;
    }

    .diff-badge {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .diff-badge.E { color: var(--easy); background: rgba(52, 211, 153, 0.12); text-shadow: 0 0 8px rgba(52, 211, 153, 0.1); }
    .diff-badge.M { color: var(--medium); background: rgba(251, 191, 36, 0.12); text-shadow: 0 0 8px rgba(251, 191, 36, 0.1); }
    .diff-badge.H { color: var(--hard); background: rgba(248, 113, 113, 0.12); text-shadow: 0 0 8px rgba(248, 113, 113, 0.1); }

    .check-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #94a3b8;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 6px 14px;
      border-radius: 100px;
      user-select: none;
      transition: all 0.2s ease;
    }
    .check-pill.checked {
      color: #fff;
      border-color: var(--accent-bright);
      background: rgba(52, 211, 153, 0.08);
      box-shadow: 0 0 10px rgba(52, 211, 153, 0.1);
    }
    .check-pill .box {
      width: 12px; height: 12px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .check-pill.checked .box::after {
      content: '✓'; font-size: 9px; color: #000; font-weight: 900;
    }

    .floating-nav {
      position: sticky;
      top: 24px;
      z-index: 100;
      margin: 0 auto 40px;
      width: fit-content;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(52, 211, 153, 0.15);
      border-radius: 100px;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    }

    .nav-item {
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .nav-item:hover {
      color: var(--accent-bright);
      background: rgba(52, 211, 153, 0.08);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Skeleton Loading Infrastructure */
    .skeleton-loading .reveal-panel,
    .skeleton-loading #dayList {
      pointer-events: none;
    }
    .skeleton-loading .stat-value,
    .skeleton-loading #problemsStat,
    .skeleton-loading #pctStat,
    .skeleton-loading #streakStat {
      background: rgba(255, 255, 255, 0.06);
      color: transparent !important;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      display: inline-block;
      min-width: 60px;
    }
    .skeleton-loading .stat-value::after,
    .skeleton-loading #problemsStat::after,
    .skeleton-loading #pctStat::after,
    .skeleton-loading #streakStat::after {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: pulseSkeleton 1.4s infinite linear;
    }
    @keyframes pulseSkeleton { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* Layout expansion height constraints */
    .day-body-wrapper {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .day-body-wrapper.expanded {
      grid-template-rows: 1fr;
    }
    .day-body-inner {
      overflow: hidden;
    }
  </style>
</head>

  const getLocalStorageKey = () => `gridline_dsa_cache_${currentUserId}`;

  async function saveDSAData() {
    localStorage.setItem(getLocalStorageKey(), JSON.stringify(state));
    await setDoc(syncDocRef, { state: state }, { merge: true });
  }

  function allProblemsDone(dObj) {
    if (!dObj.problems || dObj.problems.length === 0) return true;
    const subState = state[dObj.day]?.problems || {};
    return dObj.problems.every(p => subState[p.id] === true);
  }

  function dayComplete(dObj) {
    return state[dObj.day]?.theory && allProblemsDone(dObj);
  }

  // FIXED INITIALIZATION VECTOR: Sets layout objects into target state array exactly once
  function buildInitialStructure() {
    const list = document.getElementById('dayList');
    list.innerHTML = '';

    days.forEach(d => {
      const card = document.createElement('div');
      card.id = `day-card-${d.day}`;
      card.className = 'day-card day-card-item p-4 mb-3';
      
      card.innerHTML = `
        <div class="day-head flex items-center justify-between gap-4 cursor-pointer select-none" id="day-head-${d.day}">
          <div class="flex items-center gap-4">
            <span class="day-num text-xs font-bold text-slate-500 font-mono tracking-wider">DAY ${d.day}</span>
            <span class="day-title text-sm font-semibold text-slate-200 transition-colors">${d.title}</span>
          </div>
          <div class="flex items-center gap-4">
            <div class="mini-dots flex gap-1.5">
              <span class="mini-dot" id="dot-theory-${d.day}"></span>
              <span class="mini-dot" id="dot-problems-${d.day}"></span>
            </div>
            <span class="chevron text-slate-600 text-xs transform transition-transform duration-200" id="chevron-${d.day}">\u25b8</span>
          </div>
        </div>
        <div class="day-body-wrapper" id="day-wrapper-${d.day}">
          <div class="day-body-inner">
            <div class="day-body border-t border-white/5 mt-4 pt-4 space-y-4" id="day-body-${d.day}"></div>
          </div>
        </div>
      `;

      card.querySelector(`#day-head-${d.day}`).onclick = () => toggleDayDropdown(d.day);
      list.appendChild(card);
      dayElementsMap[d.day] = card;
    });
  }

  function toggleDayDropdown(dayId) {
    const wrapper = document.getElementById(`day-wrapper-${dayId}`);
    const chevron = document.getElementById(`chevron-${dayId}`);
    
    if (!wrapper.classList.contains('expanded')) {
      // Close the old active layout dropdown node seamlessly
      if (openDayId && openDayId !== dayId) {
        const oldWrapper = document.getElementById(`day-wrapper-${openDayId}`);
        const oldChevron = document.getElementById(`chevron-${openDayId}`);
        if (oldWrapper) oldWrapper.classList.remove('expanded');
        if (oldChevron) oldChevron.classList.remove('rotate-90');
      }
      
      // Inject content first, then animate layout open
      renderDayBodyContent(dayId);
      wrapper.classList.add('expanded');
      chevron.classList.add('rotate-90');
      openDayId = dayId;
    } else {
      wrapper.classList.remove('expanded');
      chevron.classList.remove('rotate-90');
      openDayId = null;
    }
    
    // Recalculate scrolling parameters down the screen coordinates safely
    setTimeout(() => { ScrollTrigger.refresh(); }, 310);
  }

  function renderDayBodyContent(dayId) {
    const d = days.find(x => x.day === dayId);
    if (!d) return;
    const body = document.getElementById(`day-body-${dayId}`);
    const s = state[dayId] || { theory: false, problems: {} };
    const probGlow = allProblemsDone(d);

    let bodyHTML = '';
    if (d.theory && d.theory.length) {
      bodyHTML += `<div><div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Theory</div>
        <ul class="space-y-1.5">${d.theory.map(t => `<li class="text-xs text-slate-400 pl-3 relative before:content-['–'] before:absolute before:left-0 before:text-slate-600">${t}</li>`).join('')}</ul></div>`;
    }
    if (d.problems && d.problems.length) {
      bodyHTML += `<div><div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Problems</div>
        <ul class="problem-list space-y-2"></ul></div>`;
    }
    if (d.revision) {
      bodyHTML += `<div><div class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Task / Revision Notes</div>
        <div class="text-xs text-slate-400 italic opacity-90 border-l border-[var(--accent)]/30 pl-3">${d.revision}</div></div>`;
    }
    body.innerHTML = bodyHTML;

    if (d.problems && d.problems.length) {
      const ul = body.querySelector('.problem-list');
      d.problems.forEach(pr => {
        const isDone = s.problems?.[pr.id] === true;
        const li = document.createElement('li');
        li.className = 'flex items-center justify-between p-3 bg-white/[0.02] border border-white/5 rounded-xl cursor-pointer hover:bg-white/[0.04] transition-colors' + (isDone ? ' prob-done bg-[var(--accent)]/[0.01]' : '');
        li.innerHTML = `
          <div class="flex items-center gap-3">
            <span class="prob-box"></span>
            <span class="text-xs font-medium ${isDone ? 'text-slate-400' : 'text-slate-200'}">${pr.name}</span>
          </div>
          ${pr.diff ? `<span class="diff-badge ${pr.diff}">${pr.diff === 'E' ? 'Easy' : pr.diff === 'M' ? 'Medium' : 'Hard'}</span>` : ''}
        `;
        
        li.onclick = function(e) {
          e.stopPropagation();
          if (navigator.vibrate) navigator.vibrate(12);
          if(!state[d.day]) state[d.day] = { theory: false, problems: {} };
          if(!state[d.day].problems) state[d.day].problems = {};
          const stateBefore = state[d.day].problems[pr.id];
          state[d.day].problems[pr.id] = !state[d.day].problems[pr.id];
          saveDSAData();
          syncTargetCardState(dayId);
          if (!stateBefore && dayComplete(d) && typeof confetti === 'function') triggerCelebrateConfetti();
        };
        ul.appendChild(li);
      });
    }

    const checkRow = document.createElement('div');
    checkRow.className = 'flex flex-wrap items-center gap-3 pt-2';
    checkRow.innerHTML = `
      <span class="check-pill interactive ${s.theory ? 'checked' : ''}" id="theoryPill_${d.day}"><span class="box"></span>Theory</span>
      <span class="check-pill ${probGlow ? 'checked' : ''}"><span class="box"></span>Problems</span>
      <button class="ml-auto text-xs font-bold py-2 px-4 rounded-full border border-[var(--accent)] text-[var(--accent)] hover:bg-[var(--accent)]/10 transition-colors" id="toggleDayBtn_${d.day}">${dayComplete(d) ? 'Unmark complete' : 'Mark day complete'}</button>
    `;
    body.appendChild(checkRow);

    checkRow.querySelector(`#theoryPill_${d.day}`).onclick = function(e) {
      e.stopPropagation();
      if (navigator.vibrate) navigator.vibrate(12);
      if(!state[d.day]) state[d.day] = { theory: false, problems: {} };
      state[d.day].theory = !state[d.day].theory;
      saveDSAData();
      syncTargetCardState(dayId);
      if (state[d.day].theory && dayComplete(d) && typeof confetti === 'function') triggerCelebrateConfetti();
    };
    
    checkRow.querySelector(`#toggleDayBtn_${d.day}`).onclick = function(e) {
      e.stopPropagation();
      if (navigator.vibrate) navigator.vibrate(15);
      if(!state[d.day]) state[d.day] = { theory: false, problems: {} };
      if(!state[d.day].problems) state[d.day].problems = {};
      if (dayComplete(d)) {
        state[d.day].theory = false;
        d.problems.forEach(pr => { state[d.day].problems[pr.id] = false; });
      } else {
        state[d.day].theory = true;
        d.problems.forEach(pr => { state[d.day].problems[pr.id] = true; });
        if (typeof confetti === 'function') triggerCelebrateConfetti();
      }
      saveDSAData();
      syncTargetCardState(dayId);
    };
  }

  function syncTargetCardState(dayId) {
    const d = days.find(x => x.day === dayId);
    const card = dayElementsMap[dayId];
    if (!card || !d) return;

    const s = state[dayId] || { theory: false, problems: {} };
    const probGlow = allProblemsDone(d);
    const isCompleted = dayComplete(d);

    if (isCompleted) card.classList.add('complete'); else card.classList.remove('complete');
    
    const dotTheory = card.querySelector(`#dot-theory-${dayId}`);
    const dotProblems = card.querySelector(`#dot-problems-${dayId}`);
    
    if (s.theory) dotTheory.classList.add('on'); else dotTheory.classList.remove('on');
    if (probGlow) dotProblems.classList.add('on'); else dotProblems.classList.remove('on');

    if (openDayId === dayId) {
      renderDayBodyContent(dayId);
    }
    updateOverview();
  }

  function syncAllCardVisuals() {
    days.forEach(d => {
      const card = dayElementsMap[d.day];
      if (!card) return;
      const s = state[d.day] || { theory: false, problems: {} };
      const probGlow = allProblemsDone(d);
      const isCompleted = dayComplete(d);

      if (isCompleted) card.classList.add('complete'); else card.classList.remove('complete');
      
      const dotTheory = card.querySelector(`#dot-theory-${d.day}`);
      const dotProblems = card.querySelector(`#dot-problems-${d.day}`);
      
      if (s.theory) dotTheory.classList.add('on'); else dotTheory.classList.remove('on');
      if (probGlow) dotProblems.classList.add('on'); else dotProblems.classList.remove('on');
    });
    updateOverview();
  }

  function triggerCelebrateConfetti() {
    confetti({ particleCount: 70, spread: 65, origin: { y: 0.85 }, colors: ['#34d399', '#ffffff'] });
  }

  function updateOverview() {
    const complete = days.filter(d => dayComplete(d)).length;
    let problemsSolved = 0;
    days.forEach(d => {
      if (d.problems) {
        d.problems.forEach(pr => { if (state[d.day]?.problems?.[pr.id] === true) problemsSolved++; });
      }
    });
    const pct = Math.round(complete / 120 * 100);
    let streak = 0;
    for (let i = days.length; i >= 1; i--) {
      const d = days.find(x => x.day === i);
      if (d && dayComplete(d)) streak++; else break;
    }
    document.getElementById('daysStat').innerHTML = `${complete}<span class="text-xs text-slate-500 font-medium lowercase tracking-normal"> / 120 days complete</span>`;
    document.getElementById('problemsStat').textContent = problemsSolved;
    document.getElementById('pctStat').textContent = pct + '%';
    document.getElementById('streakStat').textContent = streak;
    
    gsap.to("#progressFill", { width: pct + "%", duration: 0.5, ease: "power2.out" });
  }

  // Initialize structural grids safely before attaching sync pipelines
  buildInitialStructure();

  // --- GLOBAL REAL-TIME PIPELINE ASYNC MATRIX ---
async function initializeDSASync() {
  try {
    const profileDocRef = doc(db, "habit_users", normalizedId);
    const profileSnapshot = await getDoc(profileDocRef);
    if (profileSnapshot.exists()) {
      const onlineProfileData = profileSnapshot.data();
      currentUserProfile = onlineProfileData;
      
      // FIX: Update the display indicator text using the cloud profile string
      updateHeaderName(onlineProfileData.username); 
    }
  } catch (e) {
    console.error("Profile sync failure:", e);
  }

  // onSnapshot block remains exactly the same below...

  onSnapshot(syncDocRef, (snapshot) => {
    document.body.classList.remove('skeleton-loading');
    if (snapshot.exists()) {
      state = snapshot.data().state || {};
    } else {
      state = {};
      days.forEach(d => {
        state[d.day] = { theory: false, problems: {} };
        if (d.problems) d.problems.forEach(pr => { state[d.day].problems[pr.id] = false; });
      });
    }
    localStorage.setItem(getLocalStorageKey(), JSON.stringify(state));
    
    syncAllCardVisuals();

    if (!isAppLoaded) {
      animateEntrance();
      isAppLoaded = true;
    }
  });
}

// Start the network sync
initializeDSASync();
</script>
</body>
</html>
